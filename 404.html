<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Page introuvable — Salon Reda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a96e;
      --gold-border: rgba(201,169,110,0.25);
      --bg: #0a0a08;
      --card: #111109;
      --text: #f0ebe0;
      --text-muted: #8a8070;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --script: 'Great Vibes', cursive;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }
    .logo {
      font-family: var(--script);
      font-size: 52px;
      color: var(--gold);
      margin-bottom: 8px;
      line-height: 1;
    }
    .logo-sub {
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 56px;
    }
    .err-num {
      font-family: var(--serif);
      font-size: clamp(80px, 18vw, 160px);
      font-weight: 300;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px var(--gold-border);
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }
    .divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 0 auto 28px;
      opacity: 0.5;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 400;
      margin-bottom: 14px;
      color: var(--text);
    }
    p {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 44px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--gold);
      color: #0a0a08;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .footer-note {
      margin-top: 64px;
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="logo">Reda</div>
  <div class="logo-sub">Hairstyling &amp; Beauty Professionals</div>

  <div class="err-num">404</div>
  <div class="divider"></div>

  <h1>Page Introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil pour découvrir nos services.</p>

  <a href="/" class="btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Retour à l'accueil
  </a>

  <div class="footer-note">© 2025 Salon Reda · Casablanca, Maroc</div>
</body>
</html>
