# Netlify configuration — Salon Reda

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Stop MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Enable XSS protection in older browsers
    X-XSS-Protection = "1; mode=block"
    # Control referrer info sent to other sites
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Force HTTPS for 1 year
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://app.cal.com https://formspree.io https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://*.tile.openstreetmap.org; frame-src https://app.cal.com https://cal.com; connect-src 'self' https://formspree.io https://app.cal.com https://*.tile.openstreetmap.org; object-src 'none'; base-uri 'self';"

# Cache static assets aggressively
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/main.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

# Custom 404
[build]
  publish = "."

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
